<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almacén General AG — Layout 3D | Argenparts</title>
<style>
  :root{ --ink:#20303f; --accent:#0f62ac; --line:#cbd5e0; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Roboto,Arial,sans-serif;color:var(--ink);}
  #app{width:100%;height:100%;}
  canvas{display:block;}
  .panel{
    position:absolute;background:rgba(255,255,255,.95);border:1px solid var(--line);
    border-radius:8px;box-shadow:0 2px 14px rgba(25,45,70,.14);
  }
  #titlebar{top:12px;left:12px;padding:9px 14px;max-width:330px;display:flex;gap:11px;align-items:center;}
  #titlebar h1{font-size:14.5px;letter-spacing:.5px;}
  #titlebar p{font-size:10.5px;color:#5c6b7a;margin-top:2px;}

  #tabs{top:12px;left:50%;transform:translateX(-50%);padding:6px;display:flex;gap:5px;}
  #tabs button{
    border:1px solid var(--line);background:#fff;border-radius:5px;padding:6px 14px;
    font-size:11.5px;font-weight:600;color:var(--ink);cursor:pointer;
  }
  #tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  #tabs button:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

  #legend{top:88px;left:12px;width:262px;max-height:calc(100% - 320px);overflow-y:auto;padding:10px 12px;}
  #legend h2,#layers h2{
    font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;color:#68788a;
    margin-bottom:7px;border-bottom:1px solid #e4eaf0;padding-bottom:5px;
  }
  .zrow{display:flex;align-items:center;gap:8px;padding:3.5px 6px;border-radius:5px;cursor:pointer;font-size:11.5px;}
  .zrow:hover{background:#eaf2fa;}
  .chip{width:13px;height:13px;border-radius:2px;border:1px solid rgba(0,0,0,.22);flex:0 0 13px;}
  .zletter{font-weight:700;min-width:24px;flex:0 0 24px;color:var(--accent);font-size:10.5px;}

  #layers{bottom:12px;left:12px;padding:10px 12px;font-size:11.5px;}
  #layers label{display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;user-select:none;}
  #layers input{accent-color:var(--accent);}

  #views{top:12px;right:12px;padding:6px;display:flex;gap:5px;}
  #views a,#views button{
    border:1px solid var(--line);background:#fff;border-radius:5px;padding:6px 13px;
    font-size:11.5px;font-weight:600;color:var(--ink);cursor:pointer;text-decoration:none;
  }
  #views button:hover,#views a:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

  #stats{top:62px;right:12px;padding:9px 14px;font-size:11px;line-height:1.9;min-width:168px;}
  #stats .lbl{color:#68788a;font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;}
  #stats b{color:var(--accent);font-size:13px;}

  #info{display:none;right:12px;top:190px;width:248px;padding:12px 14px;}
  #info h3{font-size:13.5px;margin-bottom:4px;}
  #info .tag{display:inline-block;background:var(--accent);color:#fff;border-radius:3px;
    padding:1px 8px;font-size:10.5px;font-weight:700;margin-bottom:6px;}
  #info p{font-size:11.5px;line-height:1.55;color:#42525f;}
  #info .close{position:absolute;top:6px;right:10px;cursor:pointer;color:#8494a4;font-size:13px;}

  #hint{
    position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
    background:rgba(32,48,63,.82);color:#e8eef5;font-size:11px;
    padding:6px 14px;border-radius:16px;pointer-events:none;white-space:nowrap;
  }
  #credit{position:fixed;bottom:10px;right:14px;font-size:10.5px;color:rgba(70,90,110,0.55);
    pointer-events:none;user-select:none;letter-spacing:.3px;z-index:999;}
  @media (max-width:820px){ #legend{display:none;} #hint{display:none;} #titlebar{max-width:210px;} #stats{display:none;} }
</style>
</head>
<body>
<div id="app"></div>

<div class="panel" id="titlebar">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="32" height="29">
    <path d="M95,41 Q110,15 125,41 L191,159 Q206,186 176,186 L44,186 Q14,186 29,159 Z" fill="#29ABE2"/>
    <text x="110" y="163" font-family="Arial Black, Arial" font-weight="900" font-size="83"
          fill="#fff" text-anchor="middle" letter-spacing="-2">AG</text>
  </svg>
  <div>
    <h1>ALMACÉN GENERAL AG · 3D</h1>
    <p id="subt">Bodegas 1·2·3·5 · 52 × 70 m · 18 racks</p>
  </div>
</div>

<div class="panel" id="tabs">
  <button id="tab1" class="on">Bodegas 1 · 2 · 3 · 5</button>
  <button id="tab7">Bodega 7</button>
</div>

<div class="panel" id="legend">
  <h2>Zonas — clic para ir</h2>

</div>

<div class="panel" id="layers">
  <h2>Capas</h2>
  <label><input type="checkbox" id="lyRacks"  checked> Racks</label>
  <label><input type="checkbox" id="lyCargo"  checked> Mercancía</label>
  <label><input type="checkbox" id="lyZones"  checked> Zonas y demarcación</label>
  <label><input type="checkbox" id="lyEquip"  checked> Equipos y mobiliario</label>
  <label><input type="checkbox" id="lySafe"   checked> Seguridad</label>
  <label><input type="checkbox" id="lyWalls"  checked> Paredes</label>

<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script>
'use strict';
/* ============================================================
   ALMACÉN GENERAL AG — visor 3D estilo render CAD
   Bodegas 1·2·3·5 (52×70 m) + Bodega 7 aduanera (26×37 m)
   Cada bodega vive en un Group centrado en el origen; toda la
   geometría usa coordenadas locales del plano (x der, z abajo).
   ============================================================ */

/* ---------- Renderer / escena ---------- */
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
document.getElementById('app').appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xf0f2f5);

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,900);
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08;
controls.maxPolarAngle=Math.PI/2-0.01;
controls.minDistance=3; controls.maxDistance=300;

scene.add(new THREE.HemisphereLight(0xffffff,0x9aa2aa,0.5));
const sun=new THREE.DirectionalLight(0xffffff,1.15);
sun.position.set(55,75,30);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-70; sun.shadow.camera.right=70;
sun.shadow.camera.top=75;   sun.shadow.camera.bottom=-75;
sun.shadow.camera.far=260;  sun.shadow.bias=-0.0004;
scene.add(sun);
const fill=new THREE.DirectionalLight(0xdfe8f2,0.35);
fill.position.set(-45,35,-35);
scene.add(fill);

const ground=new THREE.Mesh(new THREE.PlaneGeometry(600,600),
  new THREE.MeshStandardMaterial({color:0xdadee2,roughness:0.95}));
ground.rotation.x=-Math.PI/2; ground.position.y=-0.03; ground.receiveShadow=true;
scene.add(ground);
const grid=new THREE.GridHelper(600,150,0xc4cad0,0xd0d5da);
grid.position.y=-0.02; scene.add(grid);

/* ---------- Materiales ---------- */
const M={
  slab  : new THREE.MeshStandardMaterial({color:0x8f959b,roughness:0.9}),
  wall  : new THREE.MeshStandardMaterial({color:0xc9d2da,roughness:0.85,transparent:true,opacity:0.13,depthWrite:false}),
  post  : new THREE.MeshStandardMaterial({color:0x1a4f8f,roughness:0.55,metalness:0.35}),
  brace : new THREE.MeshStandardMaterial({color:0xb4bcc2,roughness:0.5,metalness:0.5}),
  edge  : new THREE.LineBasicMaterial({color:0x4a5866}),
};
const kraft=[0xb5854f,0xc49a6c,0xa87b4a,0xcaa273].map(c=>
  new THREE.MeshStandardMaterial({color:c,roughness:0.92}));

function edgesOf(mesh){
  const e=new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry),M.edge);
  e.position.copy(mesh.position); e.rotation.copy(mesh.rotation);
  return e;
}
const pickables=[];
let seed=13;
function rnd(){ seed=(seed*9301+49297)%233280; return seed/233280; }

/* ---------- Sprites y textos ---------- */
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function textSprite(text,opts){
  opts=opts||{};
  const fs=opts.fontSize||56, pad=24;
  const cv=document.createElement('canvas');
  let ctx=cv.getContext('2d');
  ctx.font='600 '+fs+'px Segoe UI, Arial';
  cv.width=ctx.measureText(text).width+pad*2; cv.height=fs+pad*1.4;
  ctx=cv.getContext('2d');
  ctx.fillStyle=opts.bg||'rgba(255,255,255,0.92)';
  ctx.strokeStyle=opts.border||'rgba(70,90,110,0.6)';
  ctx.lineWidth=3;
  roundRect(ctx,2,2,cv.width-4,cv.height-4,14); ctx.fill(); ctx.stroke();
  ctx.font='600 '+fs+'px Segoe UI, Arial';
  ctx.fillStyle=opts.color||'#20303f';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,cv.width/2,cv.height/2+2);
  const tex=new THREE.CanvasTexture(cv); tex.anisotropy=4;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,depthTest:false}));
  const s=opts.scale||1;
  sp.scale.set(1.1*(cv.width/cv.height)*s,1.1*s,1);
  return sp;
}
function floorText(txt,sub,x,y,w,d,color){
  const res=80;
  const cv=document.createElement('canvas');
  cv.width=Math.max(140,Math.round(w*res)); cv.height=Math.max(140,Math.round(d*res));
  const ctx=cv.getContext('2d');
  ctx.fillStyle=color||'rgba(40,55,70,0.8)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  let big=Math.min(cv.width/(txt.length*0.62),cv.height*(sub?0.4:0.55));
  ctx.font='700 '+big+'px Segoe UI, Arial';
  ctx.fillText(txt,cv.width/2,sub?cv.height/2-big*0.28:cv.height/2);
  if(sub){
    const fs=Math.min(big*0.5, cv.width/(sub.length*0.62));
    ctx.font='600 '+fs+'px Segoe UI, Arial';
    ctx.fillText(sub,cv.width/2,cv.height/2+big*0.45);
  }
  const tex=new THREE.CanvasTexture(cv); tex.anisotropy=8;
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),
    new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false}));
  m.rotation.x=-Math.PI/2;
  m.position.set(x+w/2,0.055,y+d/2);
  return m;
}
function paintedLine(x1,z1,x2,z2,wd,color,h){
  const dx=x2-x1,dz=z2-z1,len=Math.hypot(dx,dz);
  const m=new THREE.Mesh(new THREE.PlaneGeometry(wd,len),
    new THREE.MeshBasicMaterial({color:color}));
  m.rotation.x=-Math.PI/2; m.rotation.z=-Math.atan2(dx,dz);
  m.position.set((x1+x2)/2,h||0.045,(z1+z2)/2);
  return m;
}
function zoneBorder(g,x,y,w,d,color,wd){
  wd=wd||0.1;
  g.add(paintedLine(x,y,x+w,y,wd,color));
  g.add(paintedLine(x,y+d,x+w,y+d,wd,color));
  g.add(paintedLine(x,y,x,y+d,wd,color));
  g.add(paintedLine(x+w,y,x+w,y+d,wd,color));
}

/* ============================================================
   CONSTRUCTORES REUTILIZABLES (estilo CAD)
   ============================================================ */
function buildShell(wh,W,D,H){
  const slab=new THREE.Mesh(new THREE.BoxGeometry(W+1.2,0.12,D+1.2),M.slab);
  slab.position.set(W/2,-0.06+0.02,D/2);
  slab.receiveShadow=true;
  wh.root.add(slab); wh.root.add(edgesOf(slab));
  const grd=new THREE.Mesh(new THREE.PlaneGeometry(W,D),
    new THREE.MeshStandardMaterial({color:0xa6abb0,roughness:0.9}));
  grd.rotation.x=-Math.PI/2; grd.position.set(W/2,0.01,D/2); grd.receiveShadow=true;
  wh.root.add(grd);
  // cuadrícula sutil cada 4 m
  for(let qx=4;qx<W;qx+=4) wh.zones.add(paintedLine(qx,0,qx,D,0.045,0xb8bdc2,0.02));
  for(let qz=4;qz<D;qz+=4) wh.zones.add(paintedLine(0,qz,W,qz,0.045,0xb8bdc2,0.02));
  // coordenadas pintadas cada 8 m
  for(let ax=0;ax<=W;ax+=8) wh.zones.add(floorText('X'+ax,null,ax-0.8,0.2,1.6,1.0,'rgba(70,85,100,0.75)'));
  for(let az=0;az<=D;az+=8) wh.zones.add(floorText('Y'+az,null,0.2,az-0.5,1.6,1.0,'rgba(70,85,100,0.75)'));
  // perímetro
  zoneBorder(wh.zones,0,0,W,D,0x30404e,0.16);
  // paredes translúcidas
  const T=0.26;
  [[W+2*T,H,T,W/2,H/2,-T/2],[W+2*T,H,T,W/2,H/2,D+T/2],
   [T,H,D,-T/2,H/2,D/2],[T,H,D,W+T/2,H/2,D/2]].forEach(p=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(p[0],p[1],p[2]),M.wall);
    m.position.set(p[3],p[4],p[5]);
    wh.walls.add(m); wh.walls.add(edgesOf(m));
  });
}

function addZone(wh,z){
  const info={letter:z.k,name:z.name,
    body:'Dimensiones: '+z.w.toFixed(2)+' m × '+z.d.toFixed(2)+' m<br>Superficie: '+(z.w*z.d).toFixed(1)+' m²'};
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(z.w,z.d),
    new THREE.MeshStandardMaterial({color:z.color,roughness:0.85}));
  fl.rotation.x=-Math.PI/2;
  fl.position.set(z.x+z.w/2,0.03,z.y+z.d/2);
  fl.receiveShadow=true; fl.userData.info=info;
  wh.zones.add(fl); pickables.push(fl);
  zoneBorder(wh.zones,z.x,z.y,z.w,z.d,0xe8b90c,0.09);
  if(z.paint){
    const tw=Math.min(z.w*0.9,11), td=Math.min(z.d*0.55,tw*0.5+1.2);
    wh.zones.add(floorText(z.paint,z.sub||null,z.x+z.w/2-tw/2,z.y+z.d/2-td/2,tw,td));
  }
  const lb=textSprite(z.k+' · '+z.name,{fontSize:40,scale:0.6});
  lb.position.set(z.x+z.w/2,1.9,z.y+z.d/2);
  wh.labels.add(lb);
}

/* Estantería / rack CAD: postes azules + charolas metálicas + cajas kraft
   Firma compatible con el layout original:
   addRack(wh, x, z, modules, levels, orient, {label,color,modLen,rackW,levelH}) */
function addRack(wh,x,z,modules,levels,orient,opts){
  orient=orient||'z'; opts=opts||{};
  const ML=opts.modLen||1.05, RW=opts.rackW||0.95, LH=opts.levelH||0.58;
  const PT=0.06;
  const totalLen=modules*ML, totalH=levels*LH;
  const g=new THREE.Group();
  const shelfMat=new THREE.MeshStandardMaterial({color:opts.color||0x2f6bb0,roughness:0.5,metalness:0.35});
  const info={letter:opts.label||'Rack',name:opts.label?('Rack '+opts.label.replace(/\n.*/,'')):'Rack',
    body:levels+' niveles · '+modules+' módulos de '+ML.toFixed(2)+' m<br>Longitud: '+totalLen.toFixed(1)+' m · Altura: '+totalH.toFixed(1)+' m'};

  const postGeo=new THREE.BoxGeometry(PT,totalH,PT);
  for(let m=0;m<=modules;m++){
    for(let s=0;s<2;s++){
      const post=new THREE.Mesh(postGeo,M.post);
      const lp=m*ML-totalLen/2, wp=(s===0?-1:1)*(RW/2-PT/2);
      post.position.set(orient==='z'?wp:lp, totalH/2, orient==='z'?lp:wp);
      post.castShadow=true; post.userData.info=info;
      g.add(post); pickables.push(post);
    }
  }
  for(let lv=0;lv<=levels;lv++){
    for(let mb=0;mb<modules;mb++){
      const bLen=ML-PT;
      const geo=orient==='z'
        ? new THREE.BoxGeometry(RW-PT,0.045,bLen)
        : new THREE.BoxGeometry(bLen,0.045,RW-PT);
      const shelf=new THREE.Mesh(geo,shelfMat);
      const lc=mb*ML+ML/2-totalLen/2;
      shelf.position.set(orient==='z'?0:lc, lv*LH+0.02, orient==='z'?lc:0);
      shelf.castShadow=true; shelf.receiveShadow=true; shelf.userData.info=info;
      g.add(shelf); pickables.push(shelf);
    }
  }
  // mercancía kraft ordenada
  for(let lv=0;lv<levels;lv++){
    for(let mb=0;mb<modules;mb++){
      if(rnd()>0.26){
        const bh=LH*0.55, bl=ML*0.4+rnd()*ML*0.12, bw=(RW-PT)*0.55;
        const geo=orient==='z'
          ? new THREE.BoxGeometry(bw,bh,bl)
          : new THREE.BoxGeometry(bl,bh,bw);
        const box=new THREE.Mesh(geo,kraft[Math.floor(rnd()*kraft.length)]);
        const lc=mb*ML+ML/2-totalLen/2+(rnd()-0.5)*ML*0.2;
        const xo=(rnd()-0.5)*(RW-PT)*0.25;
        box.position.set(orient==='z'?xo:lc, lv*LH+0.045+bh/2, orient==='z'?lc:xo);
        box.castShadow=true;
        wh.cargo.add(cloneToWorld(box,g,x,z,orient,totalLen));
      }
    }
  }
  g.position.set(orient==='z'?x:x+totalLen/2, 0.02, orient==='z'?z+totalLen/2:z);
  wh.racks.add(g);
  if(opts.label){
    const lb=textSprite(opts.label.replace('\n',' · '),{fontSize:40,scale:0.55,color:'#fff',
      bg:'rgba(15,98,172,0.95)',border:'rgba(10,60,110,0.8)'});
    lb.position.set(orient==='z'?x:x+totalLen/2, totalH+0.7, orient==='z'?z+totalLen/2:z);
    wh.labels.add(lb);
  }
  return {totalLen:totalLen,totalH:totalH};
}
// coloca la caja (creada en coords locales del rack) directamente en coords de bodega
function cloneToWorld(box,rackGroup,x,z,orient,totalLen){
  const gx= orient==='z' ? x : x+totalLen/2;
  const gz= orient==='z' ? z+totalLen/2 : z;
  box.position.x+=gx; box.position.z+=gz; box.position.y+=0.02;
  return box;
}

function addSolidBox(wh,x,z,w,d,h,color,lbl){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
    new THREE.MeshStandardMaterial({color:color,roughness:0.8}));
  m.position.set(x+w/2,h/2+0.02,z+d/2);
  m.castShadow=true; m.receiveShadow=true;
  if(lbl) m.userData.info={letter:'EQ',name:lbl.replace('\n',' '),body:'Equipo / mobiliario'};
  wh.equip.add(m); wh.equip.add(edgesOf(m));
  if(lbl){
    pickables.push(m);
    const sp=textSprite(lbl.replace('\n',' '),{fontSize:36,scale:0.5});
    sp.position.set(x+w/2,h+0.55,z+d/2);
    wh.labels.add(sp);
  }
}

/* ---------- Equipos detallados (Bodega 7) ---------- */
function grp(wh,layer,x,z,rotY){
  const g=new THREE.Group();
  g.rotation.y=rotY||0; g.position.set(x,0.02,z);
  wh[layer].add(g);
  return g;
}
function ph(color,extra){ const o=Object.assign({color:color,roughness:0.6,metalness:0.2},extra||{}); return new THREE.MeshStandardMaterial(o); }

function addWorkTable(wh,x,z,w,d,rotY,lbl){
  const g=grp(wh,'equip',x,z,rotY);
  const top=new THREE.Mesh(new THREE.BoxGeometry(w,0.05,d),ph(0xc8b480));

function newWarehouse(W,D){
  const wh={W:W,D:D,root:new THREE.Group()};
  ['racks','cargo','zones','equip','safety','walls','labels','dims'].forEach(k=>{
    wh[k]=new THREE.Group(); wh.root.add(wh[k]);
  });
  wh.root.position.set(-W/2,0,-D/2);
  scene.add(wh.root);
  return wh;
}
function dimArrow(wh,p1,p2,label){
  const a=new THREE.Vector3(p1[0],p1[1],p1[2]), b=new THREE.Vector3(p2[0],p2[1],p2[2]);
  wh.dims.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([a,b]),
    new THREE.LineBasicMaterial({color:0x5b6a78})));
  const dir=b.clone().sub(a).normalize();
  [[a,dir],[b,dir.clone().negate()]].forEach(pr=>{
    const cone=new THREE.Mesh(new THREE.ConeGeometry(0.16,0.55,8),
      new THREE.MeshBasicMaterial({color:0x5b6a78}));
    cone.position.copy(pr[0].clone().addScaledVector(pr[1],0.28));
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),pr[1]);
    wh.dims.add(cone);
  });
  const t=textSprite(label,{fontSize:42,scale:0.8});
  t.position.set((a.x+b.x)/2,0.7,(a.z+b.z)/2);
  wh.dims.add(t);
}

const WHS={
  1:{wh:wh1, zones:ZONES1, stats:['18','181','660'],
     subt:'Bodegas 1·2·3·5 · 52 × 70 m · 18 racks',
     iso:[46,36,60], top:[0,105,0.01], front:[0,9,55,0,3,10]},

     subt:'Bodega 7 aduanera · 26 × 37 m · racks BB–V + Z',

let cur=1;
const zoneList=document.getElementById('zoneList');

function setTab(id){
  cur=id;
  document.getElementById('tab1').classList.toggle('on',id===1);
  document.getElementById('tab7').classList.toggle('on',id===7);
  wh1.root.visible=(id===1);
  wh7.root.visible=(id===7);
  const c=WHS[id];
  document.getElementById('subt').textContent=c.subt;
  document.getElementById('sRacks').textContent=c.stats[0];
  document.getElementById('sMods').textContent=c.stats[1];
  document.getElementById('sPos').textContent=c.stats[2];
  // leyenda
  zoneList.innerHTML='';
  c.zones.forEach(z=>{
    const row=document.createElement('div');
    row.className='zrow';
    row.innerHTML='<span class="chip" style="background:#'+z.color.toString(16).padStart(6,'0')+'"></span>'+
      '<span class="zletter">'+z.k+'</span><span>'+z.name+'</span>';
    row.onclick=()=>{
      const wx=z.x+z.w/2-c.wh.W/2, wz=z.y+z.d/2-c.wh.D/2;
      flyTo([wx+12,11,wz+13],[wx,0.5,wz]);
      showInfo({letter:z.k,name:z.name,
        body:'Dimensiones: '+z.w.toFixed(2)+' m × '+z.d.toFixed(2)+' m<br>Superficie: '+(z.w*z.d).toFixed(1)+' m²'});
    };
    zoneList.appendChild(row);
  });
  flyTo(c.iso,[0,0.8,0]);
}
document.getElementById('tab1').onclick=()=>setTab(1);
document.getElementById('tab7').onclick=()=>setTab(7);

[['lyRacks','racks'],['lyCargo','cargo'],['lyZones','zones'],['lyEquip','equip'],
 ['lySafe','safety'],['lyWalls','walls'],['lyLabels','labels'],['lyDims','dims']].forEach(b=>{
  document.getElementById(b[0]).addEventListener('change',e=>{
    wh1[b[1]].visible=e.target.checked;
    wh7[b[1]].visible=e.target.checked;
  });
});

let flyAnim=null;
function flyTo(pos,tgt){
  flyAnim={p0:camera.position.clone(),p1:new THREE.Vector3(pos[0],pos[1],pos[2]),
           t0:controls.target.clone(),t1:new THREE.Vector3(tgt[0],tgt[1],tgt[2]),k:0};
}
document.getElementById('vIso').onclick=()=>flyTo(WHS[cur].iso,[0,0.8,0]);
document.getElementById('vTop').onclick=()=>flyTo(WHS[cur].top,[0,0,0]);
document.getElementById('vFront').onclick=()=>{
  const f=WHS[cur].front;
  flyTo([f[0],f[1],f[2]],[f[3],f[4],f[5]]);
};

const ray=new THREE.Raycaster(), mouse=new THREE.Vector2();
let downAt=null;
renderer.domElement.addEventListener('pointerdown',e=>{downAt=[e.clientX,e.clientY];});
renderer.domElement.addEventListener('pointerup',e=>{
  if(!downAt) return;
  const dx=e.clientX-downAt[0], dy=e.clientY-downAt[1]; downAt=null;
  if(dx*dx+dy*dy>25) return;
  mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(pickables,false);
  const hit=hits.find(h=>vis(h.object));
  if(hit&&hit.object.userData.info) showInfo(hit.object.userData.info);
});
function vis(o){ while(o){ if(o.visible===false) return false; o=o.parent; } return true; }
function showInfo(info){
  document.getElementById('infoLetter').textContent=info.letter;
  document.getElementById('infoName').textContent=info.name;
  document.getElementById('infoBody').innerHTML=info.body;
  document.getElementById('info').style.display='block';
}
document.getElementById('infoClose').onclick=()=>{document.getElementById('info').style.display='none';};

camera.position.set(46,36,60);
controls.target.set(0,0.8,0);
setTab(1);

(function animate(){
  requestAnimationFrame(animate);
  if(flyAnim){
    flyAnim.k=Math.min(1,flyAnim.k+0.04);
    const k=flyAnim.k, s=k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    camera.position.lerpVectors(flyAnim.p0,flyAnim.p1,s);
    controls.target.lerpVectors(flyAnim.t0,flyAnim.t1,s);
    if(k>=1) flyAnim=null;
  }
  controls.update();
  renderer.render(scene,camera);
})();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
